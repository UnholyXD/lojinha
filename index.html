<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Itens de RPG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container mt-4">
        <header class="text-center mb-5">
            <h1 class="display-4">Loja de Itens de RPG</h1>
            <p class="lead">Gere itens aleatórios para sua aventura!</p>
        </header>

        <div class="row">
            <div class="col-md-3">
                <div class="card mb-4">
                    <div class="card-header bg-dark text-white">
                        <h5 class="mb-0">Configurações</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <h6>Categorias</h6>
                            <div class="form-check">
                                <input class="form-check-input category-check" type="checkbox" value="armas" id="armas" checked>
                                <label class="form-check-label" for="armas">
                                    Armas
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input category-check" type="checkbox" value="armaduras" id="armaduras" checked>
                                <label class="form-check-label" for="armaduras">
                                    Armaduras
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input category-check" type="checkbox" value="pocoes" id="pocoes" checked>
                                <label class="form-check-label" for="pocoes">
                                    Poções
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input category-check" type="checkbox" value="pergaminhos" id="pergaminhos" checked>
                                <label class="form-check-label" for="pergaminhos">
                                    Pergaminhos
                                </label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="itemCount" class="form-label">Quantidade de itens: <span id="itemCountValue">12</span></label>
                            <input type="range" class="form-range" min="5" max="30" value="12" id="itemCount">
                        </div>
                        <button id="generateBtn" class="btn btn-primary w-100">Gerar Itens</button>
                    </div>
                </div>
            </div>

            <div class="col-md-9">
                <div id="loading" class="text-center my-5 d-none">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Carregando...</span>
                    </div>
                    <p class="mt-2">Gerando itens mágicos...</p>
                </div>

                <div id="shopItems" class="row g-4">
                    <!-- Itens serão inseridos aqui via JavaScript -->
                    <div class="col-12 text-muted text-center py-5">
                        <i class="bi bi-shop display-4 d-block mb-3"></i>
                        <h4>Clique em "Gerar Itens" para começar</h4>
                        <p class="mb-0">Selecione as categorias desejadas e ajuste a quantidade de itens</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <div class="container">
            <p class="mb-0">Loja de Itens de RPG &copy; 2025</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js" type="module"></script>
</body>
</html>
